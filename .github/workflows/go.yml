# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
  schedule:
    # Monthly cert renewal check (runs 1st of every month at 4am)
    - cron: 0 4 1 * *

permissions:
  contents: write
  packages: write

jobs:
  run_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check images are optimized (WebP format)
        run: |
          echo "Checking for unoptimized images..."
          # Find any remaining PNGs, JPGs, or JPEGs (should be WebP only)
          UNOPTIMIZED=$(find web/static/images -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) 2>/dev/null || true)
          if [ -n "$UNOPTIMIZED" ]; then
            echo "ERROR: Unoptimized images found (should be WebP):"
            echo "$UNOPTIMIZED"
            exit 1
          fi
          echo "All images are in WebP format ✓"

      - name: Check image sizes
        run: |
          echo "Checking image sizes..."
          # Fail if any WebP image is larger than 100KB
          LARGE=$(find web/static/images -type f -name "*.webp" -size +100k 2>/dev/null || true)
          if [ -n "$LARGE" ]; then
            echo "WARNING: Large images found (>100KB):"
            du -h $LARGE
            echo "Consider further optimization"
          fi
          echo "Image size check complete ✓"

      - name: Build Docker Image
        run: |
          docker build -t blog:latest .

      - name: Push Docker Image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag blog:latest ghcr.io/${{ github.repository_owner }}/blog:latest
          docker push ghcr.io/${{ github.repository_owner }}/blog:latest

      - name: Deploy to Server
        uses: appleboy/scp-action@v1
        with:
          host: 46.101.95.175
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml"
          target: "/root/"

      - name: Pull latest Docker image and run Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: 46.101.95.175
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export CERT_PATH="${{ secrets.CERT_PATH }}"
            export KEY_PATH="${{ secrets.KEY_PATH }}"
            export ENV="production"
            export TURSO_DATABASE="${{ secrets.TURSO_DATABASE }}"
            docker compose pull
            docker compose down
            docker compose up -d
            sleep 5
            curl -f -k https://localhost:443 || exit 1
            docker image prune -a -f
